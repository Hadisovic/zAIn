<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phase Progress</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: #0f0f13;
    color: rgba(255,255,255,0.85);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 32px 16px;
  }
  .container { max-width: 720px; width: 100%; }

  /* ── Overall header ── */
  h1 {
    font-size: 22px; font-weight: 600;
    margin-bottom: 4px; letter-spacing: -0.3px;
  }
  .subtitle {
    font-size: 13px; color: rgba(255,255,255,0.4);
    margin-bottom: 24px;
  }

  /* ── Top progress bar ── */
  .progress-wrap {
    background: rgba(255,255,255,0.06);
    border-radius: 999px; height: 8px; overflow: hidden;
    margin-bottom: 8px;
  }
  .progress-fill {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, #6c5ce7, #a29bfe);
    border-radius: 999px; transition: width 0.4s cubic-bezier(0.22,1,0.36,1);
  }
  .progress-label {
    font-size: 12px; color: rgba(255,255,255,0.5);
    text-align: right; margin-bottom: 28px;
  }

  /* ── Phase card ── */
  .phase {
    background: rgba(255,255,255,0.04);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 14px; margin-bottom: 12px; overflow: hidden;
    transition: border-color 0.3s;
  }
  .phase.done { border-color: rgba(108,92,231,0.3); }

  .phase-header {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 16px; cursor: pointer;
    user-select: none; -webkit-user-select: none;
  }
  .phase-header:hover { background: rgba(255,255,255,0.03); }

  .phase-toggle {
    width: 20px; height: 20px; flex-shrink: 0;
    border-radius: 6px; border: 2px solid rgba(255,255,255,0.15);
    display: flex; align-items: center; justify-content: center;
    transition: all 0.25s; font-size: 11px;
  }
  .phase-toggle.checked {
    background: #6c5ce7; border-color: #6c5ce7;
  }

  .phase-title {
    flex: 1; font-size: 14px; font-weight: 500;
  }
  .phase-title .badge {
    display: inline-block; font-size: 10px; font-weight: 500;
    padding: 1px 7px; border-radius: 999px; margin-left: 8px;
    background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.45);
    vertical-align: middle;
  }
  .phase-title .badge.done-badge { background: rgba(108,92,231,0.25); color: #a29bfe; }
  .phase-title .badge.in-progress-badge { background: rgba(162,155,254,0.15); color: #a29bfe; }
  .phase-title .badge.deferred-badge { background: rgba(255,193,7,0.15); color: #ffc107; }

  .phase-sub-bar {
    flex: 0 0 64px; height: 4px;
    background: rgba(255,255,255,0.06); border-radius: 999px; overflow: hidden;
  }
  .phase-sub-fill {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, #6c5ce7, #a29bfe);
    border-radius: 999px; transition: width 0.4s cubic-bezier(0.22,1,0.36,1);
  }

  .phase-arrow {
    font-size: 10px; color: rgba(255,255,255,0.2);
    transition: transform 0.25s; flex-shrink: 0;
  }
  .phase-arrow.open { transform: rotate(90deg); }

  /* ── Task list ── */
  .tasks { border-top: 1px solid rgba(255,255,255,0.04); }
  .task {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 9px 16px 9px 24px;
    font-size: 13px; line-height: 1.45;
    color: rgba(255,255,255,0.6);
    transition: color 0.3s;
  }
  .task:hover { background: rgba(255,255,255,0.02); }
  .task.done { color: rgba(255,255,255,0.35); text-decoration: line-through; }

  .task-cb {
    appearance: none; -webkit-appearance: none;
    width: 16px; height: 16px; flex-shrink: 0; margin-top: 2px;
    border: 1.5px solid rgba(255,255,255,0.15);
    border-radius: 4px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; position: relative;
  }
  .task-cb:checked {
    background: #6c5ce7; border-color: #6c5ce7;
  }
  .task-cb:checked::after {
    content: ""; position: absolute; width: 5px; height: 9px;
    border: solid #fff; border-width: 0 2px 2px 0;
    top: 2px; transform: rotate(45deg);
  }
  .task-cb:focus-visible { outline: 2px solid rgba(108,92,231,0.5); outline-offset: 2px; }

  /* ── Reset button ── */
  .reset {
    margin-top: 20px; text-align: center;
  }
  .reset button {
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.35); font-size: 12px;
    padding: 8px 18px; border-radius: 999px; cursor: pointer;
    transition: all 0.2s;
  }
  .reset button:hover {
    background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.6);
  }
</style>
</head>
<body>
<div class="container">
  <h1>Project Progress</h1>
  <p class="subtitle">Zain Companion Desktop Widget — Order: 1 → 2 → 4 → 5 → 6 → 3</p>

  <div class="progress-wrap">
    <div class="progress-fill" id="globalFill"></div>
  </div>
  <div class="progress-label" id="globalLabel">0 / 0 tasks</div>

  <div id="phases"></div>

  <div class="reset">
    <button onclick="resetAll()">Reset all progress</button>
  </div>
</div>

<script>
// ── Phase data ────────────────────────────────────────────────────────────
const PHASES = [
  {
    id: 'p1', title: 'Phase 1: Foundation', badge: 'Done',
    tasks: [
      'npm create tauri-app → React + TypeScript + Vite',
      'Install plugins: shell, store, log',
      'Create progress/ directory',
      'Configure tauri.conf.json: transparent, frameless, always-on-top, skip-taskbar',
      'Install frontend deps: motion, zustand, use-flip, tailwind, esbuild',
      'Set up Tailwind + glassmorphism globals.css',
      'Create Zustand stores (chat, config)',
      'Create BlobCanvas.tsx — Canvas 2D circle, click to expand, drag fallthrough',
      'Create ChatWidget.tsx with AnimatePresence spring expand/collapse',
      'Create ChatInput.tsx — auto-expanding textarea',
      'Create MessageBubble.tsx — iMessage-style bubbles',
      'Create MessageList.tsx — auto-scroll list',
      'Create SettingsPanel.tsx — voice picker + provider selector',
      'Keyboard shortcuts: Ctrl+Space toggle, Escape collapse',
      'Build + tsc --noEmit pass cleanly',
      'Click-through: Rust cursor polling + CSS transparency fixes',
      'Window drag: start_dragging command + app-region CSS',
    ]
  },
  {
    id: 'p2', title: 'Phase 2: Chat UI', badge: 'Done',
    tasks: [
      'Input bar with glassmorphism, auto-expand textarea',
      'Message bubbles with spring enter/exit animation',
      'Send → glow thinking indicator, auto-reply after 1.5s',
      'Message list with auto-scroll and AnimatePresence',
      'Settings panel slide-out with voice picker + provider selector',
    ]
  },
  {
    id: 'p4', title: 'Phase 4: LLM + TTS', badge: 'In Progress',
    tasks: [
      'Rust LLM proxy: Ollama, OpenAI, Anthropic, Gemini, DeepSeek streaming',
      'Rust sidecar manager: spawn, monitor, restart, heartbeat',
      'Audio playback: sidecar PCM → Rust base64 → Web Audio API',
      'Token streaming animation + TTS sync (event listeners in App.tsx)',
      'Frontend API layer: Tauri command wrappers + event listeners',
      'Stop generation button in ChatWidget header',
      'Sidecar autostart on app mount',
      'Quantization options wired through config → TTS',
      'Python sidecar: CSM JSONL IPC (needs CSM installed)',
    ]
  },
  {
    id: 'p5', title: 'Phase 5: Particles + Installer', badge: 'Planned',
    tasks: [
      'R3F canvas overlay, VFXParticles in idle ambient mode',
      'Audio-reactive particles: bass/mid/treble → uniforms',
      '4 visualization presets (Orb/Wave/Galaxy/Tunnel)',
      'Installer (NSIS), auto-updater (GitHub Releases)',
    ]
  },
  {
    id: 'p6', title: 'Phase 6: Blob Visual Design', badge: 'Planned',
    tasks: [
      'Noise-based shape displacement (simplex/perlin on circle vertices)',
      'Organic morphing animation (slow, continuous shape evolution)',
      'Color animation (subtle hue shifting or gradient cycling)',
      'Glassmorphism overlay effect on blob surface',
      'Hover/attention state (subtle scale or glow change)',
      'Click ripple effect',
      'Clean transition between blob and expanded chat',
      'Polish: shadow, depth, ambient glow',
    ]
  },
  {
    id: 'p3', title: 'Phase 3: Desktop Awareness', badge: 'Deferred',
    tasks: [
      'Rust window title detection (Windows API)',
      'Frontend context → state mapper',
      'Manual modes UI + desktop-aware mode toggle',
    ]
  },
]

// ── Storage ───────────────────────────────────────────────────────────────
const STORAGE_KEY = 'zain_progress'
function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY)
    if (raw) return JSON.parse(raw)
  } catch {}
  // First visit: apply defaults (Phase 1 & 2 = done, rest = not)
  const defaults = {}
  PHASES.forEach((phase) => {
    phase.tasks.forEach((_, i) => {
      defaults[`${phase.id}_t${i}`] = phase.id === 'p1' || phase.id === 'p2'
    })
  })
  return defaults
}
function saveState(state) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state))
}

// ── Render ────────────────────────────────────────────────────────────────
function render() {
  const state = loadState()
  const container = document.getElementById('phases')
  container.innerHTML = ''
  let totalTasks = 0, doneTasks = 0

  PHASES.forEach((phase) => {
    const phaseKey = phase.id
    const open = state[phaseKey]?.open !== false // default open
    const phaseDone = state[phaseKey]?.done || false

    const tasks = phase.tasks.map((t, i) => {
      const taskKey = `${phaseKey}_t${i}`
      const checked = state[taskKey] || phaseDone || false
      if (checked) doneTasks++
      totalTasks++
      return { text: t, key: taskKey, checked }
    })

    const tasksDone = tasks.filter(t => t.checked).length
    const pct = phase.tasks.length ? Math.round(tasksDone / phase.tasks.length * 100) : 0
    const allDone = tasksDone === phase.tasks.length

    // Phase card
    const card = document.createElement('div')
    card.className = `phase${allDone ? ' done' : ''}`
    card.id = `card-${phaseKey}`

    // Header
    const hdr = document.createElement('div')
    hdr.className = 'phase-header'
      const badgeLabel = allDone ? 'Done' : phase.badge
      const badgeClass = allDone ? 'done-badge' : badgeLabel === 'In Progress' ? 'in-progress-badge' : badgeLabel === 'Deferred' ? 'deferred-badge' : ''
      hdr.innerHTML = `
      <div class="phase-toggle${allDone ? ' checked' : ''}">${allDone ? '✓' : ''}</div>
      <div class="phase-title">
        ${phase.title}
        <span class="badge${badgeClass ? ' ' + badgeClass : ''}">${badgeLabel}</span>
      </div>
      <div class="phase-sub-bar"><div class="phase-sub-fill" style="width:${pct}%"></div></div>
      <div class="phase-arrow${open ? ' open' : ''}">▶</div>
    `
    const toggleEl = hdr.querySelector('.phase-toggle')
    toggleEl.addEventListener('click', (e) => {
      e.stopPropagation()
      const s = loadState()
      const newVal = !allDone
      tasks.forEach((t) => { s[t.key] = newVal })
      if (!s[phaseKey]) s[phaseKey] = {}
      s[phaseKey].done = newVal
      saveState(s)
      render()
    })
    hdr.addEventListener('click', (e) => {
      if (e.target.closest('.phase-toggle')) return
      const s = loadState()
      if (!s[phaseKey]) s[phaseKey] = {}
      s[phaseKey].open = !open
      saveState(s)
      render()
    })
    card.appendChild(hdr)

    // Task list
    if (open) {
      const list = document.createElement('div')
      list.className = 'tasks'
      tasks.forEach((t) => {
        const row = document.createElement('label')
        row.className = `task${t.checked ? ' done' : ''}`
        row.innerHTML = `
          <input type="checkbox" class="task-cb" ${t.checked ? 'checked' : ''}>
          ${t.text}
        `
        const cb = row.querySelector('.task-cb')
        cb.addEventListener('change', (e) => {
          const s = loadState()
          s[t.key] = e.target.checked
          saveState(s)
          render()
        })
        list.appendChild(row)
      })
      card.appendChild(list)
    }

    container.appendChild(card)
  })

  // Global progress bar
  document.getElementById('globalFill').style.width = totalTasks ? `${Math.round(doneTasks / totalTasks * 100)}%` : '0%'
  document.getElementById('globalLabel').textContent = `${doneTasks} / ${totalTasks} tasks`
}

// ── Reset ─────────────────────────────────────────────────────────────────
function resetAll() {
  if (!confirm('Reset all progress checkboxes?')) return
  localStorage.removeItem(STORAGE_KEY)
  render()
}

// ── Bootstrap ─────────────────────────────────────────────────────────────
render()
</script>
</body>
</html>
